<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PKM Editor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
</head>
<body class="h-full bg-gray-900 text-gray-100 font-sans">

  <!-- Login Form -->
  <div id="login-container" class="hidden min-h-screen flex items-center justify-center">
    <form id="login-form" class="bg-gray-800 rounded-lg shadow-xl p-8 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-white mb-6 text-center">PKM Editor</h1>
      <div id="login-error" class="hidden mb-4 p-3 bg-red-900/50 border border-red-700 rounded text-red-300 text-sm"></div>
      <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
      <input
        id="password"
        type="password"
        autocomplete="current-password"
        class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"
        placeholder="Enter password"
      />
      <button type="submit" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
        Sign In
      </button>
    </form>
  </div>

  <!-- Editor App -->
  <div id="editor-app" class="hidden flex flex-col h-full">
    <!-- Header / Status Bar -->
    <div class="bg-gray-800 border-b border-gray-700 px-3 py-1.5 flex items-center gap-3 text-sm">
      <span class="font-semibold text-gray-300">PKM Editor</span>
      <span id="editor-status" class="text-gray-400 truncate flex-1"></span>
      <div id="editor-header-status" class="flex items-center gap-2">
        <button id="save-button" disabled class="px-3 py-1 bg-green-600 hover:bg-green-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white rounded text-xs font-medium">Save</button>
        <button id="refresh-button" class="px-3 py-1 bg-gray-600 hover:bg-gray-500 text-white rounded text-xs font-medium">Refresh</button>
        <a id="admin-link" href="?page=admin" class="px-3 py-1 bg-gray-600 hover:bg-gray-500 text-white rounded text-xs font-medium no-underline">Admin</a>
        <span id="sse-status" class="w-2.5 h-2.5 rounded-full bg-gray-400 inline-block" title="Connecting..."></span>
      </div>
    </div>

    <!-- File Selector with Filters -->
    <div class="bg-gray-50 px-2 sm:px-4 py-2 sm:py-3 border-b">
      <!-- Mobile: Today + Calendar + Disclosure -->
      <div class="flex items-center gap-2 sm:hidden mb-2">
        <button
          id="today-button"
          class="px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm font-medium whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-blue-500"
          title="Open today's journal"
        >Today</button>
        <button id="calendar-toggle-btn-mobile"
          class="px-2 py-1 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded text-sm focus:outline-none"
          title="Calendar"><svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="3" y1="10" x2="21" y2="10" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="16" y1="2" x2="16" y2="6" /></svg></button>
        <button
          id="filter-toggle"
          class="px-2 py-1 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
          title="Show/hide file filters"
        >
          <svg class="w-4 h-4 transition-transform" id="filter-toggle-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
        <span id="file-count-mobile" class="text-xs text-gray-500 ml-auto"></span>
      </div>

      <!-- Filter Controls (collapsible on mobile, always visible on desktop) -->
      <div id="filter-controls" class="hidden sm:flex flex-wrap items-center gap-2 sm:gap-3">
        <button
          id="nav-back-btn"
          class="hidden px-1.5 py-1 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded text-sm focus:outline-none"
          title="Go back (Alt+Left)"
        >&#8592;</button>

        <button
          id="today-button-desktop"
          class="hidden sm:inline-block px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm font-medium whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-blue-500"
          title="Open today's journal"
        >Today</button>

        <!-- Calendar popup toggle (desktop) -->
        <button id="calendar-toggle-btn"
          class="hidden sm:inline-block px-2 py-1 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded text-sm focus:outline-none"
          title="Calendar"><svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="3" y1="10" x2="21" y2="10" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="16" y1="2" x2="16" y2="6" /></svg></button>

        <label class="hidden sm:inline text-sm font-medium text-gray-700">Source:</label>
        <select id="source-filter" class="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          <option value="all">All</option>
          <option value="org">Org</option>
          <option value="logseq">Logseq</option>
        </select>

        <label class="hidden sm:inline text-sm font-medium text-gray-700">Type:</label>
        <select id="type-filter" class="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          <option value="all">All</option>
          <option value="journal">Journals</option>
          <option value="page">Pages</option>
          <option value="other">Other</option>
        </select>

        <input id="search-filter" type="text" placeholder="Filter..."
          class="w-24 sm:w-48 px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />

        <label for="file-selector" class="hidden sm:inline text-sm font-medium text-gray-700">File:</label>
        <select id="file-selector"
          class="min-w-0 flex-1 px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-green-500 truncate">
          <option value="">Select file...</option>
        </select>

        <span id="file-count" class="hidden sm:inline text-xs sm:text-sm text-gray-500 whitespace-nowrap"></span>
      </div>

      <!-- Calendar popup (shared between mobile and desktop buttons) -->
      <div class="relative">
        <div id="calendar-popup" class="hidden absolute left-0 sm:left-auto mt-1 z-50 bg-white border border-gray-300 rounded-lg shadow-lg p-3 w-72">
          <div class="flex items-center justify-between mb-2">
            <button id="cal-prev-month" class="px-2 py-1 text-gray-600 hover:bg-gray-100 rounded">&lt;</button>
            <span id="cal-month-label" class="text-sm font-semibold text-gray-800"></span>
            <button id="cal-next-month" class="px-2 py-1 text-gray-600 hover:bg-gray-100 rounded">&gt;</button>
          </div>
          <div class="grid grid-cols-7 text-center text-xs text-gray-500 mb-1">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div id="cal-days-grid" class="grid grid-cols-7 text-center text-sm gap-y-0.5"></div>
        </div>
      </div>

      <!-- Current File Display -->
      <div id="current-file-display" class="hidden px-2 py-1 text-xs text-gray-600 font-mono bg-gray-100 border-t border-gray-200">
        <span id="current-file-path"></span>
      </div>
    </div>

    <!-- Editor Container -->
    <div id="editor-container" class="flex-1 overflow-hidden">
      <!-- CodeMirror will be mounted here -->
    </div>
  </div>

  <!-- Admin App -->
  <div id="admin-app" class="hidden flex flex-col h-full">
    <!-- Header -->
    <div class="bg-gray-800 border-b border-gray-700 px-3 py-1.5 flex items-center gap-3 text-sm">
      <a href="?" class="font-semibold text-gray-300 hover:text-white no-underline">PKM Editor</a>
      <span class="text-gray-500">/</span>
      <span class="font-semibold text-gray-100">Admin</span>
      <span class="flex-1"></span>
      <a href="?" class="px-3 py-1 bg-gray-600 hover:bg-gray-500 text-white rounded text-xs font-medium no-underline">Back to Editor</a>
    </div>

    <!-- Tab Bar -->
    <div class="bg-gray-800 border-b border-gray-700 px-3 flex gap-1">
      <button class="admin-tab px-4 py-2 text-sm text-gray-400 hover:text-white border-b-2 border-transparent" data-tab="connections">Connections</button>
      <button class="admin-tab px-4 py-2 text-sm text-gray-400 hover:text-white border-b-2 border-transparent" data-tab="prompts">Prompts</button>
      <button class="admin-tab px-4 py-2 text-sm text-gray-400 hover:text-white border-b-2 border-transparent" data-tab="rules">Rules</button>
      <button class="admin-tab px-4 py-2 text-sm text-gray-400 hover:text-white border-b-2 border-transparent" data-tab="tasks">Tasks</button>
      <button class="admin-tab px-4 py-2 text-sm text-gray-400 hover:text-white border-b-2 border-transparent" data-tab="skills">Skills</button>
      <button class="admin-tab px-4 py-2 text-sm text-gray-400 hover:text-white border-b-2 border-transparent" data-tab="self-improve">Self-Improve</button>
    </div>

    <!-- Tab Content -->
    <div id="admin-content" class="flex-1 overflow-auto p-4 sm:p-6">
      <!-- Sections are rendered dynamically by admin-page.ts -->
    </div>
  </div>

  <!-- Conflict Resolution Modal -->
  <div id="conflict-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 p-6">
      <h3 class="text-xl font-bold text-gray-800 mb-3">File Modified Remotely</h3>
      <p class="text-sm text-gray-700 mb-4">
        This file was changed on disk while you were editing.
      </p>
      <div class="bg-gray-50 rounded p-3 mb-4 text-sm space-y-1">
        <div class="flex justify-between">
          <span class="text-gray-600">Your changes:</span>
          <span class="font-mono text-gray-800" id="conflict-local-time"></span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-600">Remote changes:</span>
          <span class="font-mono text-gray-800" id="conflict-remote-time"></span>
        </div>
      </div>
      <div class="flex flex-col gap-2">
        <button id="conflict-save-mine" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
          Save My Version (Overwrite Remote)
        </button>
        <button id="conflict-reload-remote" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-medium">
          Reload Remote Version (Discard Mine)
        </button>
        <button id="conflict-backup-and-reload" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium">
          Backup Mine & Reload Remote
        </button>
        <button id="conflict-cancel" class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium">
          Cancel (Keep Editing)
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
